name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish artifacts to, for example 0.0.1 or v0.1.0"
        required: true
        type: string

jobs:
  release:
    name: Release (${{ matrix.platform }}${{ matrix.target && format(' / {0}', matrix.target) || '' }})
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/flipflopper
            archive: FlipFlopper-macos-aarch64-binary.tar.gz
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/flipflopper
            archive: FlipFlopper-macos-x86_64-binary.tar.gz
          - platform: ubuntu-22.04
            target: ''
            args: ''
            binary: target/release/flipflopper
            archive: FlipFlopper-linux-x86_64-binary.tar.gz
          - platform: windows-latest
            target: ''
            args: ''
            binary: target/release/flipflopper.exe
            archive: FlipFlopper-windows-x86_64-binary.tar.gz

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./ -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS signing / notarization (add secrets later; absent = unsigned) ──
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows signing (add secrets later) ──
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "FlipFlopper ${{ env.RELEASE_TAG }}"
          releaseBody: |
            Download the installer or binary archive for your platform below.

            > **Unsigned builds** — these are not code-signed yet.
            > - **macOS:** right-click the `.dmg` → Open to bypass Gatekeeper.
            > - **Windows:** click "More info" → "Run anyway" in the SmartScreen prompt.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p artifacts/binary
          cp "${{ matrix.binary }}" artifacts/binary/
          tar -czf "artifacts/${{ matrix.archive }}" -C artifacts/binary .

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" "artifacts/${{ matrix.archive }}" --clobber
