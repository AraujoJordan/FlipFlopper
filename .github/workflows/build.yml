name: Build

on:
  push:
    branches: [main, ai-work]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

  build:
    needs: typecheck
    name: Build (${{ matrix.platform }}${{ matrix.target && format(' / {0}', matrix.target) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact: macos-aarch64
            binary: target/aarch64-apple-darwin/release/flipflopper
            archive: FlipFlopper-macos-aarch64-binary.tar.gz
            bundle: target/aarch64-apple-darwin/release/bundle/**
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            artifact: macos-x86_64
            binary: target/x86_64-apple-darwin/release/flipflopper
            archive: FlipFlopper-macos-x86_64-binary.tar.gz
            bundle: target/x86_64-apple-darwin/release/bundle/**
          - platform: ubuntu-22.04
            target: ''
            args: ''
            artifact: linux-x86_64
            binary: target/release/flipflopper
            archive: FlipFlopper-linux-x86_64-binary.tar.gz
            bundle: target/release/bundle/**
          - platform: windows-latest
            target: ''
            args: ''
            artifact: windows-x86_64
            binary: target/release/flipflopper.exe
            archive: FlipFlopper-windows-x86_64-binary.tar.gz
            bundle: target/release/bundle/**

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./ -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p artifacts/binary
          cp "${{ matrix.binary }}" artifacts/binary/
          tar -czf "artifacts/${{ matrix.archive }}" -C artifacts/binary .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: flipflopper-binary-${{ matrix.artifact }}
          path: artifacts/${{ matrix.archive }}
          if-no-files-found: error

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: flipflopper-bundles-${{ matrix.artifact }}
          path: ${{ matrix.bundle }}
          if-no-files-found: error
